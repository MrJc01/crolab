name: Crolab Build Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Node.js (Vite Frontend)
      uses: actions/setup-node@v3
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: web/frontend/package-lock.json

    - name: Build React SPA
      working-directory: web/frontend
      run: |
        npm ci
        npm run build
        
    - name: Copy dist to internal embed
      # Para o Go encontrar a pasta dist, movemos para o escopo do internal/web
      run: |
        mkdir -p internal/web/dist
        cp -r web/frontend/dist/* internal/web/dist/

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.22'

    - name: Build Go Gateway (Linux)
      run: GOOS=linux GOARCH=amd64 go build -o crolab-linux-amd64 cmd/crolab/main.go
      
    - name: Upload Artifact
      uses: actions/upload-artifact@v3
      with:
        name: crolab-binary
        path: crolab-linux-amd64
